<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好吃就是高兴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 30%, #ffcc80 60%, #ffab40 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰 - 漂浮食物emoji */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(255,152,0,0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(255,87,34,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255,183,77,0.08) 0%, transparent 50%),
                radial-gradient(circle at 20% 70%, rgba(255,138,101,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .floating-emoji {
            position: fixed;
            font-size: 2rem;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        .float-1 { top: 8%; left: 5%; animation-delay: 0s; }
        .float-2 { top: 15%; right: 8%; animation-delay: 1.2s; font-size: 2.5rem; }
        .float-3 { top: 70%; left: 7%; animation-delay: 2.4s; font-size: 1.8rem; }
        .float-4 { top: 75%; right: 6%; animation-delay: 3.6s; font-size: 2.2rem; }
        .float-5 { top: 40%; left: 3%; animation-delay: 4.8s; }
        .float-6 { top: 50%; right: 4%; animation-delay: 1.8s; font-size: 1.6rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(8deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(255, 111, 0, 0.15), 0 8px 20px rgba(0,0,0,0.06);
            text-align: center;
            border: 1px solid rgba(255, 183, 77, 0.3);
        }

        .logo-wrapper {
            width: 130px;
            height: 130px;
            margin: 0 auto 30px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(255, 111, 0, 0.25);
            border: 4px solid #ff9800;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .logo-wrapper:hover {
            transform: scale(1.08);
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .group-name {
            font-size: 2.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e65100, #ff6d00, #ff9100);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: 4px;
            line-height: 1.4;
        }

        .slogan-wrapper {
            margin-bottom: 35px;
        }

        .slogan {
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 600;
            color: #e65100;
            background: linear-gradient(to right, #fff3e0, #ffe0b2, #fff3e0);
            padding: 10px 28px;
            border-radius: 50px;
            letter-spacing: 3px;
            border: 2px dashed #ff9800;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
            color: #ff9800;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, transparent, #ffcc80, transparent);
        }

        .divider-icon {
            font-size: 1.6rem;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e65100;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .rules-list {
            list-style: none;
            text-align: left;
            display: inline-block;
        }

        .rule-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 20px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff8e1, #fff3e0);
            border-radius: 16px;
            border-left: 5px solid #ff9800;
            font-size: 1.1rem;
            color: #4e342e;
            line-height: 1.6;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .rule-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.15);
        }

        .rule-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .rule-text {
            font-weight: 500;
        }

        .footer-note {
            margin-top: 35px;
            font-size: 0.95rem;
            color: #bf360c;
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 24px;
                border-radius: 22px;
            }
            .group-name {
                font-size: 2rem;
                letter-spacing: 2px;
            }
            .slogan {
                font-size: 1.1rem;
                letter-spacing: 1px;
                padding: 8px 20px;
            }
            .logo-wrapper {
                width: 100px;
                height: 100px;
            }
            .rule-item {
                font-size: 1rem;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- 漂浮装饰 -->
    <div class="floating-emoji float-1">🍜</div>
    <div class="floating-emoji float-2">🍖</div>
    <div class="floating-emoji float-3">🍰</div>
    <div class="floating-emoji float-4">🥘</div>
    <div class="floating-emoji float-5">🍕</div>
    <div class="floating-emoji float-6">🍣</div>

    <div class="container">
        <div class="card">
            <!-- Logo -->
            <div class="logo-wrapper">
                <img src="cc1b3a06d6c7fe34119a8ab6529bdc81.jpg" alt="好吃就是高兴 Logo">
            </div>

            <!-- 组名 -->
            <h1 class="group-name">好吃就是高兴</h1>

            <!-- 口号 -->
            <div class="slogan-wrapper">
                <span class="slogan">高兴就多吃，吃了更高兴</span>
            </div>

            <!-- 分割线 -->
            <div class="divider">
                <span class="divider-icon">🍴</span>
            </div>

            <!-- 规则 -->
            <h2 class="section-title">📋 干饭规则</h2>
            <ul class="rules-list">
                <li class="rule-item">
                    <span class="rule-icon">⚡</span>
                    <span class="rule-text"><strong>早点干完早点吃饭</strong></span>
                </li>
                <li class="rule-item">
                    <span class="rule-icon">😤</span>
                    <span class="rule-text"><strong>不高兴了就去吃</strong></span>
                </li>
                <li class="rule-item">
                    <span class="rule-icon">😄</span>
                    <span class="rule-text"><strong>高兴了也吃</strong></span>
                </li>
            </ul>

            <p class="footer-note">🍻 没有什么是一顿饭解决不了的</p>
        </div>
    </div>

</body>
</html>
